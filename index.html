<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>error de usuario 0N1+ — PURGATORIO N TEMPLE OS 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
#video{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px}
#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#fx-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
#start{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:28px;font-family:'Courier New',monospace;
}
#glitch-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#start-haiku{position:relative;z-index:1;font-size:clamp(14px,4vw,22px);color:#fff;line-height:2.6;text-align:center;letter-spacing:0.08em}
#start-haiku .red{color:#e00;font-weight:700}
#start-sub{position:relative;z-index:1;font-size:13px;color:#fff;letter-spacing:0.4em;text-align:center;opacity:0.7}
#start-btn{position:relative;z-index:1;font-family:'Courier New',monospace;font-size:14px;color:#000;background:#e00;padding:12px 32px;letter-spacing:0.3em;border:none;cursor:pointer}
#artist-tag{position:relative;z-index:1;font-family:'Courier New',monospace;font-size:11px;color:#e00;letter-spacing:0.3em}
</style>
</head>
<body>

<div id="start">
  <canvas id="glitch-canvas"></canvas>
  <div id="start-haiku">
    <span class="red">000000</span><br>
    <span class="red">101010</span><br>
    <span class="red">111111</span><br>
    <span class="red">010101</span>
  </div>
  <button id="start-btn" onclick="iniciar()">INICIAR</button>
  <div id="artist-tag">ON1</div>
  <div id="start-sub">3RROR DE USUARIO · ON1</div>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="matrix-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<canvas id="sample-canvas" style="display:none"></canvas>

<script>
// ─── PANTALLA DE INICIO — glitch lines animadas ───────────────────────────────
const gc  = document.getElementById('glitch-canvas');
const gctx= gc.getContext('2d');
let gW, gH;

function resizeGlitch() {
  gW = gc.width  = gc.offsetWidth;
  gH = gc.height = gc.offsetHeight;
}

function drawGlitchBG() {
  if (document.getElementById('start').style.display === 'none') return;
  gctx.clearRect(0, 0, gW, gH);

  // Líneas horizontales de glitch rojo
  const n = 6 + Math.floor(Math.random() * 6);
  for (let i = 0; i < n; i++) {
    if (Math.random() > 0.4) continue;
    const y = Math.floor(Math.random() * gH);
    const h = 1 + Math.floor(Math.random() * 3);
    const w = gW * (0.2 + Math.random() * 0.7);
    const x = Math.random() * (gW - w);
    gctx.fillStyle = `rgba(220,0,0,${0.15 + Math.random() * 0.35})`;
    gctx.fillRect(x, y, w, h);
  }

  // Líneas verticales finas
  const nv = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < nv; i++) {
    if (Math.random() > 0.3) continue;
    const x = Math.floor(Math.random() * gW);
    const h = gH * (0.05 + Math.random() * 0.3);
    const y = Math.random() * (gH - h);
    gctx.fillStyle = `rgba(220,0,0,${0.08 + Math.random() * 0.2})`;
    gctx.fillRect(x, y, 1, h);
  }

  // Bloque de ruido binario ocasional
  if (Math.random() < 0.15) {
    const bx = Math.floor(Math.random() * gW * 0.7);
    const by = Math.floor(Math.random() * gH * 0.7);
    gctx.font = '9px Courier New';
    for (let r = 0; r < 4; r++) {
      let row = '';
      for (let c = 0; c < 18; c++) row += Math.random() > 0.5 ? '1' : '0';
      gctx.fillStyle = `rgba(220,0,0,${0.1 + Math.random() * 0.25})`;
      gctx.fillText(row, bx, by + r * 11);
    }
  }

  requestAnimationFrame(drawGlitchBG);
}

window.addEventListener('resize', resizeGlitch);
resizeGlitch();
drawGlitchBG();

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx, masterGain, noiseGain;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 2);
  masterGain.connect(audioCtx.destination);
  const song = new Audio('levantate_-_los_crudos.mp3');
  song.loop = true;
  const src = audioCtx.createMediaElementSource(song);
  src.connect(masterGain);
  song.play().catch(() => {});
  const bufSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
  const ns = audioCtx.createBufferSource();
  ns.buffer = buf; ns.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 400;
  noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
  ns.connect(lp); lp.connect(noiseGain); noiseGain.connect(masterGain);
  ns.start();
}

function updateAudioMotion(m) {
  if (!audioCtx || !noiseGain) return;
  noiseGain.gain.setTargetAtTime(0.016 + m * 0.055, audioCtx.currentTime, 0.4);
}

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
const TD_IP   = '192.168.100.57'; // ← CAMBIA ESTO con ipconfig
const TD_PORT = 9090;
let ws = null;

function connectWS() {
  try {
    ws = new WebSocket(`ws://${TD_IP}:${TD_PORT}`);
    ws.onopen    = () => console.log('[WS] conectado');
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.tipo === 'glitch') triggerMode(msg.nivel || 'leve');
      } catch(_) {}
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => ws.close();
  } catch(_) {}
}

// ─── MODOS ────────────────────────────────────────────────────────────────────
let currentMode = 'matrix';
let modeUntil   = 0;
let glitchLevel = 0;
let glitchUntil = 0;
let glitchShift = [];

function triggerMode(nivel) {
  const now = Date.now();
  currentMode = nivel;
  if (nivel === 'leve') {
    modeUntil   = now + 3500;
    glitchLevel = 1; glitchUntil = now + 3500;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.2 ? (Math.random()-0.5)*20 : 0);
    initParticles();
  } else if (nivel === 'medio') {
    modeUntil   = now + 4000;
    glitchLevel = 2; glitchUntil = now + 4000;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.35 ? (Math.random()-0.5)*45 : 0);
    dmAccum = null; // reset datamosh
  } else if (nivel === 'fuerte' || nivel === 'max') {
    currentMode = 'fuerte';
    modeUntil   = now + 5000;
    glitchLevel = 3; glitchUntil = now + 5000;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.55 ? (Math.random()-0.5)*70 : 0);
    dmAccum = null;
  }
}

// ─── MODO LEVE: POINT CLOUD ───────────────────────────────────────────────────
let particles = [];

function initParticles() { particles = []; }

function drawPointCloud(fxCtx, now) {
  fxCtx.fillStyle = '#000';
  fxCtx.fillRect(0, 0, W, H);
  if (!cameraActive || !pixelData || video.readyState < 2) return;

  const t     = now * 0.001;
  const pulse = 0.6 + Math.sin(t * 3) * 0.4;
  const stepX = Math.floor(sampleW / 28);
  const stepY = Math.floor(sampleH / 40);

  // Actualizar / crear partículas
  let pIdx = 0;
  for (let py = 0; py < sampleH; py += stepY) {
    for (let px = 0; px < sampleW; px += stepX) {
      const mx   = sampleW - 1 - px;
      const idx  = (py * sampleW + mx) * 4;
      const luma = pixelData[idx]*0.299 + pixelData[idx+1]*0.587 + pixelData[idx+2]*0.114;
      if (luma < 30) continue;

      const tx = (px / sampleW) * W;
      const ty = (py / sampleH) * H;

      if (!particles[pIdx]) {
        particles[pIdx] = { x: tx, y: ty, vx: 0, vy: 0, l: luma };
      } else {
        // Mover suavemente hacia target con vibración
        const p = particles[pIdx];
        p.vx += (tx - p.x) * 0.15 + (Math.random()-0.5) * 2.5;
        p.vy += (ty - p.y) * 0.15 + (Math.random()-0.5) * 2.5;
        p.vx *= 0.7; p.vy *= 0.7;
        p.x  += p.vx; p.y += p.vy;
        p.l   = luma;
      }
      pIdx++;
    }
  }
  particles.length = pIdx;

  // Dibujar partículas
  fxCtx.shadowBlur = 6;
  for (const p of particles) {
    const bright = p.l > 160;
    const size   = bright ? 2.5 : 1.5;
    const alpha  = (0.4 + (p.l/255) * 0.6) * pulse;
    if (bright) {
      fxCtx.fillStyle   = `rgba(200,220,255,${alpha})`;
      fxCtx.shadowColor = 'rgba(180,200,255,0.8)';
      fxCtx.shadowBlur  = 10;
    } else {
      fxCtx.fillStyle   = `rgba(140,160,220,${alpha})`;
      fxCtx.shadowColor = 'rgba(140,160,220,0.4)';
      fxCtx.shadowBlur  = 4;
    }
    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, size, 0, Math.PI*2);
    fxCtx.fill();
  }

  // Conectar partículas muy cercanas con líneas tenues
  fxCtx.shadowBlur = 0;
  const maxD = W * 0.045;
  const maxD2 = maxD * maxD;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d2 = dx*dx + dy*dy;
      if (d2 < maxD2) {
        const a = (1 - Math.sqrt(d2)/maxD) * 0.25 * pulse;
        fxCtx.strokeStyle = `rgba(140,160,220,${a})`;
        fxCtx.lineWidth   = 0.5;
        fxCtx.beginPath();
        fxCtx.moveTo(particles[i].x, particles[i].y);
        fxCtx.lineTo(particles[j].x, particles[j].y);
        fxCtx.stroke();
      }
    }
  }

  // Texto
  fxCtx.fillStyle = 'rgba(140,160,220,0.4)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`PTS ${particles.length.toString().padStart(4,'0')} :: 0x${Date.now().toString(16).slice(-8).toUpperCase()}`, 10, H-12);
}

// ─── MODO MEDIO: THERMAL / DATAMOSH colorido ──────────────────────────────────
let dmAccum = null;

function drawThermal(fxCtx, now) {
  if (!cameraActive || video.readyState < 2) {
    fxCtx.clearRect(0, 0, W, H); return;
  }
  if (!dmAccum || dmAccum.width !== W) {
    dmAccum = document.createElement('canvas');
    dmAccum.width = W; dmAccum.height = H;
  }
  const ac = dmAccum.getContext('2d');
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc = tmp.getContext('2d');
  tc.save(); tc.scale(-1,1); tc.drawImage(video,-W,0,W,H); tc.restore();

  ac.globalAlpha = 0.8;
  ac.drawImage(tmp, 0, 0);
  ac.globalAlpha = 1;

  const nB = 5 + Math.floor(Math.random()*7);
  for (let i = 0; i < nB; i++) {
    const bx = Math.floor(Math.random()*W);
    const by = Math.floor(Math.random()*H);
    const bw = 25 + Math.floor(Math.random()*W*0.4);
    const bh = 2  + Math.floor(Math.random()*28);
    ac.drawImage(dmAccum, bx, by, bw, bh,
      bx+(Math.random()-0.5)*W*0.3, by+(Math.random()-0.5)*8, bw, bh);
  }

  fxCtx.clearRect(0, 0, W, H);
  fxCtx.drawImage(dmAccum, 0, 0);

  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.globalAlpha = 0.2;
  fxCtx.drawImage(dmAccum, -12, 5);
  fxCtx.globalAlpha = 0.18;
  fxCtx.drawImage(dmAccum, 10, -6);
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  fxCtx.globalCompositeOperation = 'overlay';
  fxCtx.globalAlpha = 0.3;
  fxCtx.fillStyle = `hsl(${(now*0.05)%360},100%,50%)`;
  fxCtx.fillRect(0,0,W,H);
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  for (let y = 0; y < H; y += 4) {
    fxCtx.fillStyle = 'rgba(0,0,0,0.18)';
    fxCtx.fillRect(0, y, W, 1);
  }

  if (Math.random() < 0.2) {
    const gy = Math.floor(Math.random()*H);
    const gh = 10 + Math.floor(Math.random()*40);
    fxCtx.drawImage(fxCtx.canvas, 0, gy, W, gh,
      (Math.random()-0.5)*W*0.4, gy, W, gh);
  }
  if (Math.random() < 0.04) {
    fxCtx.fillStyle = `rgba(255,255,255,${0.08+Math.random()*0.18})`;
    fxCtx.fillRect(0,0,W,H);
  }
}

// ─── MODO FUERTE: DATAMOSH agresivo ───────────────────────────────────────────
function drawDatamosh(fxCtx, now) {
  if (!cameraActive || video.readyState < 2) {
    fxCtx.clearRect(0, 0, W, H); return;
  }
  if (!dmAccum || dmAccum.width !== W) {
    dmAccum = document.createElement('canvas');
    dmAccum.width = W; dmAccum.height = H;
  }
  const ac = dmAccum.getContext('2d');
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc = tmp.getContext('2d');
  tc.save(); tc.scale(-1,1); tc.drawImage(video,-W,0,W,H); tc.restore();

  ac.globalAlpha = 0.75;
  ac.drawImage(tmp, 0, 0);
  ac.globalAlpha = 1;

  const nB = 10 + Math.floor(Math.random()*12);
  for (let i = 0; i < nB; i++) {
    const bx = Math.floor(Math.random()*W);
    const by = Math.floor(Math.random()*H);
    const bw = 30 + Math.floor(Math.random()*W*0.5);
    const bh = 2  + Math.floor(Math.random()*40);
    ac.drawImage(dmAccum, bx, by, bw, bh,
      bx+(Math.random()-0.5)*W*0.45, by+(Math.random()-0.5)*12, bw, bh);
  }

  fxCtx.clearRect(0, 0, W, H);
  fxCtx.drawImage(dmAccum, 0, 0);

  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.globalAlpha = 0.25;
  fxCtx.drawImage(dmAccum, -16, 6);
  fxCtx.globalAlpha = 0.2;
  fxCtx.drawImage(dmAccum, 14, -8);
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  fxCtx.globalCompositeOperation = 'overlay';
  fxCtx.globalAlpha = 0.35;
  fxCtx.fillStyle = `hsl(${(now*0.08)%360},100%,50%)`;
  fxCtx.fillRect(0,0,W,H);
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  for (let y = 0; y < H; y += 3) {
    fxCtx.fillStyle = 'rgba(0,0,0,0.2)';
    fxCtx.fillRect(0, y, W, 1);
  }

  if (Math.random() < 0.25) {
    const gy = Math.floor(Math.random()*H);
    const gh = 15 + Math.floor(Math.random()*55);
    fxCtx.drawImage(fxCtx.canvas, 0, gy, W, gh,
      (Math.random()-0.5)*W*0.5, gy, W, gh);
  }
  if (Math.random() < 0.05) {
    fxCtx.fillStyle = `rgba(255,255,255,${0.1+Math.random()*0.2})`;
    fxCtx.fillRect(0,0,W,H);
  }
}

// ─── MATRIX ENGINE ────────────────────────────────────────────────────────────
const canvas      = document.getElementById('matrix-canvas');
const ctx         = canvas.getContext('2d');
const fxCanvas    = document.getElementById('fx-canvas');
const fxCtx       = fxCanvas.getContext('2d');
const video       = document.getElementById('video');
const sampleCanvas= document.getElementById('sample-canvas');
const sampleCtx   = sampleCanvas.getContext('2d');

let W, H, cols, rows, fontSize, cw;
let cells = [], activePhrases = [];
let motionLevel = 0, prevFrame = null;
let cameraActive = false, pixelData = null;
const sampleW = 120, sampleH = 90;

const CHARS        = '01アイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ?!@#$%&[]{}01110100';
const BRIGHT_CHARS = '@#%&WMB80';
const GLITCH_CHARS = '▓▒░█▄▀■□▪◆';

const ALL_PHRASES = [
  '¿Qué harías tú en una revolución?',
  '¿Qué estás preparando para hacer en una dictadura?',
  '¿Qué vas a hacer cuando torturen a tu hermano?',
  '¿Qué, no harás nada hasta que maten a tu madre?',
  '¡Levántate!',
  'Que estás perdiendo el tempio',
  'Infórmate y actúa',
  'Nadie te salvará',
  'Te esperas hasta que llegue el día',
  'En que tu vecino te eche a los milicos',
  'Y todo tu dinero pierda su valor',
  'Y conviertan a tu casa en tu prisión',
  'Después será demasiado tarde',
  'No te olvides que la libertad no es gratis',
  'Jamás digas que nunca va a pasar aquí',
  'No pienses que el mundo está tan lejos',
  'Siempre pueden, siempre te pueden encontrar',
];

function resize() {
  W = canvas.width  = fxCanvas.width  = window.innerWidth;
  H = canvas.height = fxCanvas.height = window.innerHeight;
  fontSize = Math.max(13, Math.min(17, W / 38));
  cw   = fontSize * 0.62;
  cols = Math.floor(W / cw);
  rows = Math.floor(H / fontSize) + 1;
  sampleCanvas.width = sampleW; sampleCanvas.height = sampleH;
  buildGrid();
}

function randChar()   { return CHARS[Math.floor(Math.random() * CHARS.length)]; }
function randBright() { return BRIGHT_CHARS[Math.floor(Math.random() * BRIGHT_CHARS.length)]; }
function randGlitch() { return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]; }

function buildGrid() {
  cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++)
      cells[r][c] = { ch: randChar(), timer: Math.random() * 20 };
  }
  activePhrases = [];
}

function sampleVideo() {
  if (!cameraActive || video.readyState < 2) return null;
  sampleCtx.drawImage(video, 0, 0, sampleW, sampleH);
  return sampleCtx.getImageData(0, 0, sampleW, sampleH).data;
}

function getPixelBrightness(r, c) {
  if (!pixelData) return 0;
  const px  = Math.floor((c / cols) * sampleW);
  const py  = Math.floor((r / rows) * sampleH);
  const mx  = sampleW - 1 - px;
  const idx = (py * sampleW + mx) * 4;
  let luma  = pixelData[idx]*0.299 + pixelData[idx+1]*0.587 + pixelData[idx+2]*0.114;
  luma = (luma - 128) * 1.8 + 128;
  return Math.max(0, Math.min(255, luma)) / 255;
}

function detectMotion(frame) {
  let diff = 0;
  if (prevFrame && frame) {
    for (let i = 0; i < frame.length; i += 4) diff += Math.abs(frame[i] - prevFrame[i]);
    diff /= (sampleW * sampleH * 255);
  }
  if (frame) prevFrame = new Uint8ClampedArray(frame);
  return Math.min(diff * 14, 1);
}

function spawnPhrase() {
  const phrase = ALL_PHRASES[Math.floor(Math.random() * ALL_PHRASES.length)];
  const chars  = phrase.split('');
  const rr     = Math.floor(Math.random() * rows);
  const rc     = Math.floor(Math.random() * Math.max(1, cols - chars.length - 1));
  activePhrases.push({
    chars, r: rr, c: rc,
    born: Date.now(),
    life: 4500 + Math.random() * 2500,
    drift: (Math.random()-0.5) * 0.06,
    fr: rr + (Math.random()-0.5) * 18,
  });
}

function updatePhrases(motion) {
  const now = Date.now();
  activePhrases = activePhrases.filter(p => now - p.born < p.life);
  if (motion > 0.002 && activePhrases.length < 14 && Math.random() < 0.42) spawnPhrase();
  activePhrases.forEach(p => {
    p.r += (p.fr - p.r) * 0.012 + p.drift * motion * 10;
    p.r  = Math.max(0, Math.min(rows-1, p.r));
  });
}

function getRedChar(r, c) {
  for (let p of activePhrases) {
    if ((Date.now() - p.born) / p.life > 0.95) continue;
    if (Math.round(p.r) !== r) continue;
    const ci = c - p.c;
    if (ci >= 0 && ci < p.chars.length) return p.chars[ci];
  }
  return null;
}

function drawMatrix() {
  const now      = Date.now();
  const isGlitch = now < glitchUntil;
  const level    = isGlitch ? glitchLevel : 0;

  ctx.fillStyle = level > 0 ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${fontSize}px "Courier New", monospace`;

  for (let r = 0; r < rows; r++) {
    const shift      = (level >= 2 && glitchShift[r]) ? glitchShift[r] : 0;
    const rowCorrupt = level === 3 && Math.random() < 0.07;

    for (let c = 0; c < cols; c++) {
      const cell   = cells[r][c];
      cell.timer  -= level > 0 ? (1 + level) : 1;
      const bright = getPixelBrightness(r, c);
      const isBody = bright > 0.32;

      if (cell.timer <= 0) {
        if (rowCorrupt || (level >= 2 && Math.random() < 0.12)) {
          cell.ch    = randGlitch();
          cell.timer = 2 + Math.random() * 5;
        } else {
          cell.ch    = isBody ? randBright() : randChar();
          cell.timer = isBody ? (4 + Math.random()*10) : (10 + Math.random()*34);
        }
      }

      const xPos = c * cw + shift;
      const yPos = r * fontSize;
      const red  = getRedChar(r, c);

      if (red !== null) {
        ctx.fillStyle   = '#ff2a2a';
        ctx.shadowBlur  = level > 0 ? 10 : 5;
        ctx.shadowColor = '#ff0000';
        ctx.fillText(red, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else if (rowCorrupt) {
        ctx.fillStyle = `rgba(255,${Math.floor(Math.random()*40)},0,0.8)`;
        ctx.fillText(cell.ch, xPos, yPos);
      } else if (isBody) {
        const a = 0.18 + bright * 0.35 + (level > 0 ? Math.random()*0.2 : 0);
        ctx.fillStyle   = `rgba(255,255,255,${a})`;
        ctx.shadowBlur  = level > 0 ? 4 : 2;
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.fillText(cell.ch, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*(0.07 + level*0.05)})`;
        ctx.fillText(cell.ch, xPos, yPos);
      }
    }

    if (level === 3 && Math.random() < 0.012) {
      ctx.fillStyle = `rgba(255,0,0,${0.3 + Math.random()*0.4})`;
      ctx.fillRect(0, r * fontSize, W, 1);
    }
  }
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() {
  const now   = Date.now();
  pixelData   = sampleVideo();
  const raw   = detectMotion(pixelData);
  motionLevel += (raw - motionLevel) * 0.18;
  updateAudioMotion(motionLevel);
  updatePhrases(motionLevel);
  drawMatrix();

  if (now < modeUntil) {
    if (currentMode === 'leve')   drawPointCloud(fxCtx, now);
    if (currentMode === 'medio')  drawThermal(fxCtx, now);
    if (currentMode === 'fuerte') drawDatamosh(fxCtx, now);
  } else if (currentMode !== 'matrix') {
    fxCtx.clearRect(0, 0, W, H);
    currentMode = 'matrix';
    glitchLevel = 0;
    particles   = [];
    dmAccum     = null;
  }

  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function iniciar() {
  document.getElementById('start').style.display = 'none';
  try { initAudio(); } catch(_) {}
  connectWS();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
  } catch(_) {
    cameraActive = false;
    setInterval(() => { motionLevel = 0.05 + Math.random() * 0.3; }, 2500);
  }

  resize();
  loop();
}

window.addEventListener('resize', resize);
resize();
</script>
