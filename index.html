<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>error de usuario 0N1+ </title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
#video{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px}
#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#fx-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
#start{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:28px;font-family:'Courier New',monospace;
}
#start-haiku{font-size:clamp(13px,3.5vw,17px);color:#fff;line-height:2.4;text-align:center;letter-spacing:0.05em}
#start-haiku .red{color:#e00;font-weight:700}
#start-sub{font-size:13px;color:#fff;letter-spacing:0.4em;text-align:center;opacity:0.85}
#start-btn{font-family:'Courier New',monospace;font-size:14px;color:#000;background:#e00;padding:12px 32px;letter-spacing:0.3em;border:none;cursor:pointer}
</style>
</head>
<body>

<div id="start">
  <div id="start-haiku" id="binary-haiku">
    <span class="red">000000</span><br>
    <span class="red">101010</span><br>
    <span class="red">111111</span><br>
    <span class="red">010101</span>
  </div>
  <button id="start-btn" onclick="iniciar()">INICIAR</button>
  <div style="font-family:'Courier New',monospace;font-size:11px;color:#e00;letter-spacing:0.3em">ON1</div>
  <div id="start-sub">3RROR DE USUARIO · ON1</div>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="matrix-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<canvas id="sample-canvas" style="display:none"></canvas>

<script>
// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx, masterGain, noiseGain;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 2);
  masterGain.connect(audioCtx.destination);
  const song = new Audio('levantate_-_los_crudos.mp3');
  song.loop = true;
  const src = audioCtx.createMediaElementSource(song);
  src.connect(masterGain);
  song.play().catch(() => {});
  const bufSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
  const ns = audioCtx.createBufferSource();
  ns.buffer = buf; ns.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 400;
  noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
  ns.connect(lp); lp.connect(noiseGain); noiseGain.connect(masterGain);
  ns.start();
}

function updateAudioMotion(m) {
  if (!audioCtx || !noiseGain) return;
  noiseGain.gain.setTargetAtTime(0.016 + m * 0.055, audioCtx.currentTime, 0.4);
}

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
const TD_IP   = '192.168.100.57';
const TD_PORT = 9090;
let ws = null;

function connectWS() {
  try {
    ws = new WebSocket(`ws://${TD_IP}:${TD_PORT}`);
    ws.onopen    = () => console.log('[WS] conectado');
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.tipo === 'glitch') triggerMode(msg.nivel || 'leve');
      } catch(_) {}
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => ws.close();
  } catch(_) {}
}

// ─── MODOS ────────────────────────────────────────────────────────────────────
let currentMode = 'matrix';
let modeUntil   = 0;
let glitchLevel = 0;
let glitchUntil = 0;
let glitchShift = [];

function triggerMode(nivel) {
  const now = Date.now();
  currentMode = nivel;
  if (nivel === 'leve') {
    modeUntil   = now + 1500;
    glitchLevel = 1; glitchUntil = now + 1500;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.25 ? (Math.random()-0.5)*25 : 0);
  } else if (nivel === 'medio') {
    modeUntil = now + 3000;
    glitchLevel = 2; glitchUntil = now + 3000;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.4 ? (Math.random()-0.5)*50 : 0);
    buildLines();
  } else if (nivel === 'fuerte' || nivel === 'max') {
    currentMode = 'fuerte';
    modeUntil = now + 4000;
    glitchLevel = 3; glitchUntil = now + 4000;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.55 ? (Math.random()-0.5)*70 : 0);
  }
}

// ─── MODO LEVE: cámara rojo/negro + matrix encima ─────────────────────────────
// (se dibuja directo en el matrix canvas con compositing)

// ─── MODO MEDIO: datamosh — corrupción de imagen, bloques desplazados ────────
let dmPrevFrame = null;
let dmAccum = null;
let dmAccumCtx = null;
function buildLines() {
  if (!dmAccum) {
    dmAccum = document.createElement('canvas');
    dmAccum.width = W; dmAccum.height = H;
    dmAccumCtx = dmAccum.getContext('2d');
  } else {
    dmAccum.width = W; dmAccum.height = H;
  }
  dmPrevFrame = null;
}

function drawLines(fxCtx, now) {
  const t = now * 0.001;

  if (!cameraActive || !pixelData || video.readyState < 2) {
    _drawNoiseDatmosh(fxCtx, now);
    return;
  }

  const capW = Math.min(W, 640), capH = Math.min(H, 480);
  const src = document.createElement('canvas');
  src.width = capW; src.height = capH;
  const sctx = src.getContext('2d');
  sctx.save(); sctx.scale(-1,1); sctx.drawImage(video, -capW, 0, capW, capH); sctx.restore();

  const frame = sctx.getImageData(0, 0, capW, capH);
  const data  = frame.data;

  // ── PASO 1: Channel shift agresivo ───────────────────────────────────────
  const shiftR = Math.floor(Math.sin(t * 1.3) * 90 + Math.random() * 55);
  const shiftB = Math.floor(Math.cos(t * 0.9) * 110 + Math.random() * 45);
  const shifted = new Uint8ClampedArray(data.length);

  for (let y = 0; y < capH; y++) {
    for (let x = 0; x < capW; x++) {
      const i = (y * capW + x) * 4;
      const xR = Math.min(capW - 1, x + shiftR);
      const iR = (y * capW + xR) * 4;
      const xB = Math.max(0, x - shiftB);
      const iB = (y * capW + xB) * 4;
      shifted[i]   = data[iR];
      shifted[i+1] = data[i+1];
      shifted[i+2] = data[iB+2];
      shifted[i+3] = 255;
    }
  }

  // ── PASO 2: Pixel sorting en 90% de filas, segmentos largos ─────────────
  const sortedData = new Uint8ClampedArray(shifted);
  const numSortRows = Math.floor(capH * 0.90);
  for (let si = 0; si < numSortRows; si++) {
    const y = Math.floor(Math.random() * capH);
    const row = [];
    for (let x = 0; x < capW; x++) {
      const i = (y * capW + x) * 4;
      const luma = shifted[i]*0.299 + shifted[i+1]*0.587 + shifted[i+2]*0.114;
      row.push({ luma, r: shifted[i], g: shifted[i+1], b: shifted[i+2] });
    }
    const start = Math.floor(Math.random() * capW * 0.3);
    const len   = Math.floor(capW * (0.5 + Math.random() * 0.5));
    const seg   = row.slice(start, start + len).sort((a,b) => a.luma - b.luma);
    for (let x = 0; x < seg.length; x++) {
      const i = (y * capW + start + x) * 4;
      sortedData[i]   = seg[x].r;
      sortedData[i+1] = seg[x].g;
      sortedData[i+2] = seg[x].b;
      sortedData[i+3] = 255;
    }
  }

  // ── PASO 3: Block displacement grande ────────────────────────────────────
  const blockData = new Uint8ClampedArray(sortedData);
  const numBlocks = 30 + Math.floor(Math.random() * 35);
  for (let b = 0; b < numBlocks; b++) {
    const bx  = Math.floor(Math.random() * (capW - 60));
    const by  = Math.floor(Math.random() * (capH - 20));
    const bw  = 60 + Math.floor(Math.random() * 220);
    const bh  = 3  + Math.floor(Math.random() * 55);
    const dx  = Math.floor((Math.random() - 0.5) * capW * 0.85);
    const dy  = Math.floor((Math.random() - 0.5) * capH * 0.35);
    for (let ry = 0; ry < bh; ry++) {
      const sy = Math.min(capH-1, by + ry);
      const ty = Math.min(capH-1, Math.max(0, by + ry + dy));
      for (let rx = 0; rx < bw; rx++) {
        const sx = Math.min(capW-1, bx + rx);
        const tx = Math.min(capW-1, Math.max(0, bx + rx + dx));
        const si2 = (sy * capW + sx) * 4;
        const ti  = (ty * capW + tx) * 4;
        blockData[ti]   = Math.min(255, sortedData[si2]   * 3.8);
        blockData[ti+1] = Math.min(255, sortedData[si2+1] * 0.2);
        blockData[ti+2] = Math.min(255, sortedData[si2+2] * 4.2);
        blockData[ti+3] = 255;
      }
    }
  }

  // ── PASO 4: Colorize saturado ─────────────────────────────────────────────
  for (let i = 0; i < blockData.length; i += 4) {
    const boost = 2.8;
    blockData[i]   = Math.min(255, blockData[i]   * boost);
    blockData[i+1] = Math.min(255, blockData[i+1] * boost);
    blockData[i+2] = Math.min(255, blockData[i+2] * boost);
  }

  const imgData = new ImageData(blockData, capW, capH);
  sctx.putImageData(imgData, 0, 0);

  // ── Frame base — imagen procesada con opacidad reducida para que se vea la persona
  fxCtx.clearRect(0, 0, W, H);
  fxCtx.globalAlpha = 0.75;
  fxCtx.drawImage(src, 0, 0, W, H);
  fxCtx.globalAlpha = 1;

  // ── Ghost frame acumulado ────────────────────────────────────────────────
  if (dmPrevFrame) {
    fxCtx.globalAlpha = 0.55;
    fxCtx.globalCompositeOperation = 'screen';
    fxCtx.drawImage(dmPrevFrame, 0, 0, W, H);
    fxCtx.globalAlpha = 1;
    fxCtx.globalCompositeOperation = 'source-over';
  }

  // ── Glitch strips ────────────────────────────────────────────────────────
  const numStrips = 14 + Math.floor(Math.random() * 22);
  for (let s = 0; s < numStrips; s++) {
    if (Math.random() > 0.78) continue;
    const sy  = Math.floor(Math.random() * H);
    const sh  = 1 + Math.floor(Math.random() * 35);
    const sdx = (Math.random() - 0.5) * W * 0.55;
    fxCtx.drawImage(fxCtx.canvas, 0, sy, W, sh, sdx, sy, W, sh);
  }

  // ── Color flash ──────────────────────────────────────────────────────────
  if (Math.random() < 0.22) {
    const flashColors = [
      'rgba(255,0,200,0.32)', 'rgba(0,255,80,0.26)',
      'rgba(255,220,0,0.28)', 'rgba(0,200,255,0.26)'
    ];
    fxCtx.fillStyle = flashColors[Math.floor(Math.random() * flashColors.length)];
    fxCtx.fillRect(0, 0, W, H);
  }

  // ── Guardar frame ────────────────────────────────────────────────────────
  dmPrevFrame = document.createElement('canvas');
  dmPrevFrame.width = W; dmPrevFrame.height = H;
  dmPrevFrame.getContext('2d').drawImage(fxCtx.canvas, 0, 0);

  fxCtx.fillStyle = 'rgba(255,220,0,0.4)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`DATAMOSH :: ERR 0x${Date.now().toString(16).slice(-6).toUpperCase()}`, 10, H-12);
}

function _drawNoiseDatmosh(fxCtx, now) {
  const bSize = 8;
  const cols2 = Math.ceil(W / bSize);
  const rows2 = Math.ceil(H / bSize);
  const t = now * 0.0015;
  for (let r = 0; r < rows2; r++) {
    for (let c = 0; c < cols2; c++) {
      if (Math.random() > 0.25) continue;
      const hue = (Math.sin(c * 0.3 + t) * 180 + 180) % 360;
      const sat = 70 + Math.random() * 30;
      const lit = 25 + Math.random() * 55;
      fxCtx.fillStyle = `hsl(${hue},${sat}%,${lit}%)`;
      fxCtx.fillRect(c * bSize, r * bSize, bSize, bSize);
    }
  }
  for (let i = 0; i < 5; i++) {
    if (Math.random() < 0.5) {
      const gy = Math.floor(Math.random() * H);
      const gh = 1 + Math.floor(Math.random() * 8);
      const gdx = (Math.random()-0.5) * W * 0.3;
      fxCtx.drawImage(fxCtx.canvas, 0, gy, W, gh, gdx, gy, W, gh);
    }
  }
}

// ─── MODO FUERTE: thermal / colores falsos ────────────────────────────────────
// Paleta thermal: negro → azul → cian → verde → amarillo → rojo → blanco
const THERMAL = [
  [0,0,0],[0,0,180],[0,80,255],[0,220,220],
  [0,255,100],[180,255,0],[255,200,0],[255,80,0],[255,0,0],[255,255,255]
];

function thermalColor(luma) {
  const t   = luma / 255;
  const idx = t * (THERMAL.length - 1);
  const lo  = Math.floor(idx);
  const hi  = Math.min(lo + 1, THERMAL.length - 1);
  const f   = idx - lo;
  const r   = Math.round(THERMAL[lo][0] * (1-f) + THERMAL[hi][0] * f);
  const g   = Math.round(THERMAL[lo][1] * (1-f) + THERMAL[hi][1] * f);
  const b   = Math.round(THERMAL[lo][2] * (1-f) + THERMAL[hi][2] * f);
  return [r, g, b];
}

function drawThermal(fxCtx, now) {
  if (!cameraActive || !pixelData) {
    // Sin cámara: noise thermal animado
    fxCtx.clearRect(0, 0, W, H);
    const t = now * 0.001;
    for (let y = 0; y < H; y += 4) {
      for (let x = 0; x < W; x += 4) {
        const v = (Math.sin(x*0.02 + t) + Math.cos(y*0.015 - t*0.7) + 2) / 4;
        const [r,g,b] = thermalColor(v * 255);
        fxCtx.fillStyle = `rgb(${r},${g},${b})`;
        fxCtx.fillRect(x, y, 4, 4);
      }
    }
    return;
  }

  const progress = 1 - (modeUntil - now) / 4000;

  // Dibujar la cámara procesada como thermal
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width  = sampleW;
  tmpCanvas.height = sampleH;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(video, 0, 0, sampleW, sampleH);
  const frame = tmpCtx.getImageData(0, 0, sampleW, sampleH);
  const data  = frame.data;

  // Aplicar paleta thermal pixel a pixel
  for (let i = 0; i < data.length; i += 4) {
    const luma = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
    // Contrastar
    const boosted = Math.min(255, luma * 1.6);
    const [r,g,b] = thermalColor(boosted);
    data[i]   = r;
    data[i+1] = g;
    data[i+2] = b;
  }
  tmpCtx.putImageData(frame, 0, 0);

  // Escalar al canvas fx con mirror
  fxCtx.clearRect(0, 0, W, H);
  fxCtx.save();
  fxCtx.scale(-1, 1);
  fxCtx.drawImage(tmpCanvas, -W, 0, W, H);
  fxCtx.restore();

  // Scanlines encima
  for (let y = 0; y < H; y += 3) {
    fxCtx.fillStyle = 'rgba(0,0,0,0.25)';
    fxCtx.fillRect(0, y, W, 1);
  }

  // Glitch horizontal ocasional
  if (Math.random() < 0.08) {
    const sy = Math.floor(Math.random() * H);
    const sh = 2 + Math.floor(Math.random() * 8);
    const dx = (Math.random()-0.5) * 40;
    fxCtx.drawImage(fxCtx.canvas, 0, sy, W, sh, dx, sy, W, sh);
  }

  // Texto de datos encima
  fxCtx.fillStyle = 'rgba(255,255,255,0.55)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`THERMAL SCAN :: 0x${Date.now().toString(16).toUpperCase()}`, 10, H - 24);
  fxCtx.fillText(`ERR 0N1+ :: SIGNAL ${(progress*100).toFixed(0)}%`, 10, H - 12);

  // Ruido RGB en bordes
  fxCtx.fillStyle = `rgba(255,0,0,${0.1 + Math.random()*0.15})`;
  fxCtx.fillRect(0, 0, W, 2);
  fxCtx.fillRect(0, H-2, W, 2);
}

// ─── MATRIX ENGINE ────────────────────────────────────────────────────────────
const canvas      = document.getElementById('matrix-canvas');
const ctx         = canvas.getContext('2d');
const fxCanvas    = document.getElementById('fx-canvas');
const fxCtx       = fxCanvas.getContext('2d');
const video       = document.getElementById('video');
const sampleCanvas= document.getElementById('sample-canvas');
const sampleCtx   = sampleCanvas.getContext('2d');

let W, H, cols, rows, fontSize, cw;
let cells = [], activePhrases = [];
let motionLevel = 0, prevFrame = null;
let cameraActive = false, pixelData = null;
const sampleW = 120, sampleH = 90;

const CHARS        = '01アイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ?!@#$%&[]{}01110100';
const BRIGHT_CHARS = '@#%&WMB80';
const GLITCH_CHARS = '▓▒░█▄▀■□▪◆';

const ALL_PHRASES = [
  '¿Qué harías tú en una revolución?',
  '¿Qué estás preparando para hacer en una dictadura?',
  '¿Qué vas a hacer cuando torturen a tu hermano?',
  '¿Qué, no harás nada hasta que maten a tu madre?',
  '¡Levántate!',
  'Que estás perdiendo el tempio',
  'Infórmate y actúa',
  'Nadie te salvará',
  'Te esperas hasta que llegue el día',
  'En que tu vecino te eche a los milicos',
  'Y todo tu dinero pierda su valor',
  'Y conviertan a tu casa en tu prisión',
  'Después será demasiado tarde',
  'No te olvides que la libertad no es gratis',
  'Jamás digas que nunca va a pasar aquí',
  'No pienses que el mundo está tan lejos',
  'Siempre pueden, siempre te pueden encontrar',
];

function resize() {
  W = canvas.width  = fxCanvas.width  = window.innerWidth;
  H = canvas.height = fxCanvas.height = window.innerHeight;
  fontSize = Math.max(13, Math.min(17, W / 38));
  cw   = fontSize * 0.62;
  cols = Math.floor(W / cw);
  rows = Math.floor(H / fontSize) + 1;
  sampleCanvas.width = sampleW; sampleCanvas.height = sampleH;
  buildGrid();
}

function randChar()   { return CHARS[Math.floor(Math.random() * CHARS.length)]; }
function randBright() { return BRIGHT_CHARS[Math.floor(Math.random() * BRIGHT_CHARS.length)]; }
function randGlitch() { return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]; }

function buildGrid() {
  cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++)
      cells[r][c] = { ch: randChar(), timer: Math.random() * 20 };
  }
  activePhrases = [];
}

function sampleVideo() {
  if (!cameraActive || video.readyState < 2) return null;
  sampleCtx.drawImage(video, 0, 0, sampleW, sampleH);
  return sampleCtx.getImageData(0, 0, sampleW, sampleH).data;
}

function getPixelBrightness(r, c) {
  if (!pixelData) return 0;
  const px  = Math.floor((c / cols) * sampleW);
  const py  = Math.floor((r / rows) * sampleH);
  const mx  = sampleW - 1 - px;
  const idx = (py * sampleW + mx) * 4;
  let luma  = pixelData[idx]*0.299 + pixelData[idx+1]*0.587 + pixelData[idx+2]*0.114;
  luma = (luma - 128) * 1.8 + 128;
  return Math.max(0, Math.min(255, luma)) / 255;
}

function detectMotion(frame) {
  let diff = 0;
  if (prevFrame && frame) {
    for (let i = 0; i < frame.length; i += 4) diff += Math.abs(frame[i] - prevFrame[i]);
    diff /= (sampleW * sampleH * 255);
  }
  if (frame) prevFrame = new Uint8ClampedArray(frame);
  return Math.min(diff * 14, 1);
}

function spawnPhrase() {
  const phrase = ALL_PHRASES[Math.floor(Math.random() * ALL_PHRASES.length)];
  const chars  = phrase.split('');
  const rr     = Math.floor(Math.random() * rows);
  const rc     = Math.floor(Math.random() * Math.max(1, cols - chars.length - 1));
  activePhrases.push({
    chars, r: rr, c: rc,
    born: Date.now(),
    life: 4500 + Math.random() * 2500,
    drift: (Math.random()-0.5) * 0.06,
    fr: rr + (Math.random()-0.5) * 18,
  });
}

function updatePhrases(motion) {
  const now = Date.now();
  activePhrases = activePhrases.filter(p => now - p.born < p.life);
  if (motion > 0.002 && activePhrases.length < 14 && Math.random() < 0.42) spawnPhrase();
  activePhrases.forEach(p => {
    p.r += (p.fr - p.r) * 0.012 + p.drift * motion * 10;
    p.r  = Math.max(0, Math.min(rows-1, p.r));
  });
}

function getRedChar(r, c) {
  for (let p of activePhrases) {
    if ((Date.now() - p.born) / p.life > 0.95) continue;
    if (Math.round(p.r) !== r) continue;
    const ci = c - p.c;
    if (ci >= 0 && ci < p.chars.length) return p.chars[ci];
  }
  return null;
}

// ─── MODO LEVE: cámara rojo/negro encima del matrix ──────────────────────────
// ─── MODO LEVE: CRT verde phosphor ──────────────────────────────────────────
let crtPhase = 0;

function drawCameraRedBlack(fxCtx) {
  const now = Date.now();
  crtPhase += 1;

  if (!cameraActive || !pixelData || video.readyState < 2) {
    fxCtx.fillStyle = '#000';
    fxCtx.fillRect(0, 0, W, H);
    const imgD = fxCtx.createImageData(W, H);
    const d = imgD.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() < 0.04 ? Math.floor(Math.random() * 180) : 0;
      d[i] = 0; d[i+1] = v; d[i+2] = Math.floor(v * 0.15); d[i+3] = 255;
    }
    fxCtx.putImageData(imgD, 0, 0);
    _drawCRTOverlay(fxCtx, now);
    return;
  }

  const capW = Math.min(W, 640), capH = Math.min(H, 480);
  const tmp = document.createElement('canvas');
  tmp.width = capW; tmp.height = capH;
  const tctx = tmp.getContext('2d');
  tctx.save(); tctx.scale(-1,1); tctx.drawImage(video, -capW, 0, capW, capH); tctx.restore();

  const frame = tctx.getImageData(0, 0, capW, capH);
  const data  = frame.data;

  for (let i = 0; i < data.length; i += 4) {
    const luma = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
    const phos = Math.pow(luma / 255, 0.7) * 255;
    // Más contraste — negros más negros, brillantes más brillantes
    const v = Math.min(255, phos * 1.7);
    data[i]   = Math.floor(v * 0.04);
    data[i+1] = Math.floor(v);
    data[i+2] = Math.floor(v * 0.18);
    data[i+3] = 255;
    if (v > 20 && v < 220 && Math.random() < 0.08) {
      const grain = (Math.random() - 0.5) * 28;
      data[i+1] = Math.max(0, Math.min(255, data[i+1] + grain));
    }
  }
  tctx.putImageData(frame, 0, 0);

  fxCtx.fillStyle = '#000';
  fxCtx.fillRect(0, 0, W, H);
  fxCtx.drawImage(tmp, 0, 0, W, H);

  // ── BLOOM — 3 capas de blur en screen para el halo verde intenso ─────────
  // Capa 1: bloom cercano — define el halo inmediato alrededor de zonas brillantes
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.globalAlpha = 0.65;
  fxCtx.filter = 'blur(6px)';
  fxCtx.drawImage(tmp, 0, 0, W, H);
  fxCtx.filter = 'none';
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  // Capa 2: bloom medio — el resplandor más amplio
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.globalAlpha = 0.55;
  fxCtx.filter = 'blur(18px)';
  fxCtx.drawImage(tmp, 0, 0, W, H);
  fxCtx.filter = 'none';
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  // Capa 3: bloom largo — aureola difusa en zonas muy brillantes
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.globalAlpha = 0.38;
  fxCtx.filter = 'blur(38px)';
  fxCtx.drawImage(tmp, 0, 0, W, H);
  fxCtx.filter = 'none';
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  // ── Bleeding horizontal ───────────────────────────────────────────────────
  fxCtx.globalCompositeOperation = 'screen';
  fxCtx.globalAlpha = 0.08;
  fxCtx.filter = 'blur(10px)';
  fxCtx.drawImage(tmp, 4, 0, W, H);
  fxCtx.filter = 'none';
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  _drawCRTOverlay(fxCtx, now);
}

function _drawCRTOverlay(fxCtx, now) {
  const t = now * 0.001;

  // ── Scanlines gruesas — banda negra ancha, banda verde visible entre ellas
  // y += 14: espacio total de cada ciclo (negro + verde)
  // fillRect(..., 9): grosor de la banda negra
  // → queda ~5px de verde visible entre cada línea negra
  for (let y = 0; y < H; y += 14) {
    fxCtx.fillStyle = 'rgba(0,0,0,0.92)';
    fxCtx.fillRect(0, y, W, 9);
  }

  // ── Barrido vertical (refresh line) ──────────────────────────────────────
  const scanY = (now % 1800) / 1800 * H;
  const grad = fxCtx.createLinearGradient(0, scanY - 12, 0, scanY + 12);
  grad.addColorStop(0, 'rgba(0,255,80,0)');
  grad.addColorStop(0.5, 'rgba(0,255,80,0.18)');
  grad.addColorStop(1, 'rgba(0,255,80,0)');
  fxCtx.fillStyle = grad;
  fxCtx.fillRect(0, scanY - 12, W, 24);

  // ── Glitch horizontal ─────────────────────────────────────────────────────
  if (Math.random() < 0.52) {
    const gy = Math.floor(Math.random() * H);
    const gh = 1 + Math.floor(Math.random() * 5);
    const gdx = (Math.random() - 0.5) * W * 0.04;
    fxCtx.drawImage(fxCtx.canvas, 0, gy, W, gh, gdx, gy, W, gh);
  }

  // ── Jitter vertical ───────────────────────────────────────────────────────
  if (Math.random() < 0.04) {
    const jitter = (Math.random() - 0.5) * 3;
    fxCtx.drawImage(fxCtx.canvas, 0, jitter, W, H);
  }

  // ── Vignette ──────────────────────────────────────────────────────────────
  const vig = fxCtx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.65)');
  fxCtx.fillStyle = vig;
  fxCtx.fillRect(0, 0, W, H);

  // ── Partículas de fósforo ─────────────────────────────────────────────────
  fxCtx.fillStyle = `rgba(0,255,60,${0.3 + Math.random()*0.25})`;
  for (let i = 0; i < 6; i++) {
    const px = Math.random() * W;
    const py = Math.random() * H;
    fxCtx.fillRect(px, py, 1 + Math.random()*2, 1);
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  fxCtx.fillStyle = 'rgba(0,255,80,0.45)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`CRT :: 0x${Date.now().toString(16).slice(-8).toUpperCase()}`, 10, H-12);
}
// ─── DRAW MATRIX ─────────────────────────────────────────────────────────────
function drawMatrix() {
  const now      = Date.now();
  const isGlitch = now < glitchUntil;
  const level    = isGlitch ? glitchLevel : 0;

  ctx.fillStyle = level > 0 ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${fontSize}px "Courier New", monospace`;

  for (let r = 0; r < rows; r++) {
    const shift      = (level >= 2 && glitchShift[r]) ? glitchShift[r] : 0;
    const rowCorrupt = level === 3 && Math.random() < 0.07;

    for (let c = 0; c < cols; c++) {
      const cell   = cells[r][c];
      cell.timer  -= level > 0 ? (1 + level) : 1;
      const bright = getPixelBrightness(r, c);
      const isBody = bright > 0.32;

      if (cell.timer <= 0) {
        if (rowCorrupt || (level >= 2 && Math.random() < 0.12)) {
          cell.ch    = randGlitch();
          cell.timer = 2 + Math.random() * 5;
        } else {
          cell.ch    = isBody ? randBright() : randChar();
          cell.timer = isBody ? (4 + Math.random()*10) : (10 + Math.random()*34);
        }
      }

      const xPos = c * cw + shift;
      const yPos = r * fontSize;
      const red  = getRedChar(r, c);

      if (red !== null) {
        ctx.fillStyle   = '#ff2a2a';
        ctx.shadowBlur  = level > 0 ? 10 : 5;
        ctx.shadowColor = '#ff0000';
        ctx.fillText(red, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else if (rowCorrupt) {
        ctx.fillStyle = `rgba(255,${Math.floor(Math.random()*40)},0,0.8)`;
        ctx.fillText(cell.ch, xPos, yPos);
      } else if (isBody) {
        const a = 0.18 + bright * 0.35 + (level > 0 ? Math.random()*0.2 : 0);
        ctx.fillStyle   = `rgba(255,255,255,${a})`;
        ctx.shadowBlur  = level > 0 ? 4 : 2;
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.fillText(cell.ch, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*(0.07 + level*0.05)})`;
        ctx.fillText(cell.ch, xPos, yPos);
      }
    }

    if (level === 3 && Math.random() < 0.012) {
      ctx.fillStyle = `rgba(255,0,0,${0.3 + Math.random()*0.4})`;
      ctx.fillRect(0, r * fontSize, W, 1);
    }
  }
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() {
  const now   = Date.now();
  pixelData   = sampleVideo();
  const raw   = detectMotion(pixelData);
  motionLevel += (raw - motionLevel) * 0.18;
  updateAudioMotion(motionLevel);
  updatePhrases(motionLevel);
  drawMatrix();

  if (now < modeUntil) {
    if (currentMode === 'leve')   drawCameraRedBlack(fxCtx);
    if (currentMode === 'medio')  drawLines(fxCtx, now);
    if (currentMode === 'fuerte') drawThermal(fxCtx, now);
  } else if (currentMode !== 'matrix') {
    fxCtx.clearRect(0, 0, W, H);
    currentMode = 'matrix';
    glitchLevel = 0;
  }

  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function iniciar() {
  document.getElementById('start').style.display = 'none';
  try { initAudio(); } catch(_) {}
  connectWS();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
  } catch(_) {
    cameraActive = false;
    setInterval(() => { motionLevel = 0.05 + Math.random() * 0.3; }, 2500);
  }

  resize();
  loop();
}

window.addEventListener('resize', resize);
resize();
</script>
