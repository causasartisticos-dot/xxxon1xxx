<script>
// в”Җв”Җв”Җ AUDIO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let audioCtx, masterGain, noiseGain;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 2);
  masterGain.connect(audioCtx.destination);
  const song = new Audio('levantate_-_los_crudos.mp3');
  song.loop = true;
  const src = audioCtx.createMediaElementSource(song);
  src.connect(masterGain);
  song.play().catch(() => {});
  const bufSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
  const ns = audioCtx.createBufferSource();
  ns.buffer = buf; ns.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 400;
  noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
  ns.connect(lp); lp.connect(noiseGain); noiseGain.connect(masterGain);
  ns.start();
}

function updateAudioMotion(m) {
  if (!audioCtx || !noiseGain) return;
  noiseGain.gain.setTargetAtTime(0.016 + m * 0.055, audioCtx.currentTime, 0.4);
}

// в”Җв”Җв”Җ WEBSOCKET в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TD_IP   = '192.168.100.57';
const TD_PORT = 9090;
let ws = null;

function connectWS() {
  try {
    ws = new WebSocket(`ws://${TD_IP}:${TD_PORT}`);
    ws.onopen    = () => console.log('[WS] conectado');
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.tipo === 'glitch') triggerMode(msg.nivel || 'leve');
      } catch(_) {}
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => ws.close();
  } catch(_) {}
}

// в”Җв”Җв”Җ MODOS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let currentMode = 'matrix';
let modeUntil   = 0;
let glitchLevel = 0;
let glitchUntil = 0;
let glitchShift = [];

function triggerMode(nivel) {
  const now = Date.now();
  currentMode = nivel;
  if (nivel === 'leve') {
    modeUntil   = now + 1500;
    glitchLevel = 1; glitchUntil = now + 1500;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.25 ? (Math.random()-0.5)*25 : 0);
  } else if (nivel === 'medio') {
    modeUntil = now + 3000;
    glitchLevel = 2; glitchUntil = now + 3000;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.4 ? (Math.random()-0.5)*50 : 0);
    buildLines();
  } else if (nivel === 'fuerte' || nivel === 'max') {
    currentMode = 'fuerte';
    modeUntil = now + 4000;
    glitchLevel = 3; glitchUntil = now + 4000;
    glitchShift = Array.from({length: rows}, () =>
      Math.random() < 0.55 ? (Math.random()-0.5)*70 : 0);
  }
}

// в”Җв”Җв”Җ MODO LEVE: cГЎmara rojo/negro + matrix encima в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// (se dibuja directo en el matrix canvas con compositing)

// в”Җв”Җв”Җ MODO MEDIO: cГЎmara duplicada + wireframe verde neГіn в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildLines() {} // no necesita init

function drawLines(fxCtx, now) {
  fxCtx.clearRect(0, 0, W, H);
  if (!cameraActive || video.readyState < 2) return;

  const progress = 1 - (modeUntil - now) / 3000;
  const pulse    = 0.6 + Math.sin(now * 0.008) * 0.4;

  // в”Җв”Җ 1. CГЎmara duplicada con offset (3 capas) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const offsets = [
    { dx: -W * 0.08, dy: -H * 0.04, alpha: 0.25, hue: 'rgba(0,255,80,' },
    { dx:  W * 0.08, dy:  H * 0.04, alpha: 0.25, hue: 'rgba(0,200,255,' },
    { dx:  0,        dy:  0,        alpha: 0.45, hue: null },
  ];

  for (const o of offsets) {
    fxCtx.save();
    fxCtx.globalAlpha = o.alpha;
    if (o.hue) {
      // Tinte de color sobre la cГЎmara
      fxCtx.scale(-1, 1);
      fxCtx.drawImage(video, -(W + o.dx), o.dy, W, H);
      fxCtx.globalCompositeOperation = 'screen';
      fxCtx.fillStyle = o.hue + '0.3)';
      fxCtx.fillRect(-W + o.dx, o.dy, W, H);
    } else {
      fxCtx.scale(-1, 1);
      fxCtx.drawImage(video, -W, 0, W, H);
    }
    fxCtx.restore();
    fxCtx.globalAlpha = 1;
    fxCtx.globalCompositeOperation = 'source-over';
  }

  // в”Җв”Җ 2. Extraer puntos de la silueta para el wireframe в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const pts = [];
  const stepX = Math.floor(sampleW / 18);
  const stepY = Math.floor(sampleH / 24);

  for (let py = 0; py < sampleH; py += stepY) {
    for (let px = 0; px < sampleW; px += stepX) {
      const mx   = sampleW - 1 - px;
      const idx  = (py * sampleW + mx) * 4;
      const luma = pixelData
        ? pixelData[idx]*0.299 + pixelData[idx+1]*0.587 + pixelData[idx+2]*0.114
        : 0;
      if (luma > 45) {
        pts.push({
          x: (px / sampleW) * W,
          y: (py / sampleH) * H,
          l: luma,
        });
      }
    }
  }

  if (pts.length === 0) return;

  // в”Җв”Җ 3. Wireframe: conectar puntos cercanos в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const maxDist = W * 0.12;
  fxCtx.shadowBlur  = 8;
  fxCtx.shadowColor = '#00ff50';

  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const dx   = pts[i].x - pts[j].x;
      const dy   = pts[i].y - pts[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < maxDist) {
        const a = (1 - dist / maxDist) * 0.7 * pulse;
        fxCtx.strokeStyle = `rgba(0,255,80,${a})`;
        fxCtx.lineWidth   = dist < maxDist * 0.4 ? 1.2 : 0.5;
        fxCtx.beginPath();
        fxCtx.moveTo(pts[i].x, pts[i].y);
        fxCtx.lineTo(pts[j].x, pts[j].y);
        fxCtx.stroke();
      }
    }
  }

  // в”Җв”Җ 4. Puntos del wireframe в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  for (const p of pts) {
    const bright = p.l > 180;
    fxCtx.fillStyle   = bright ? `rgba(255,255,255,${0.8 * pulse})` : `rgba(0,255,80,${0.5 * pulse})`;
    fxCtx.shadowBlur  = bright ? 10 : 4;
    fxCtx.shadowColor = bright ? '#fff' : '#00ff50';
    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, bright ? 2.5 : 1.5, 0, Math.PI*2);
    fxCtx.fill();
  }

  fxCtx.shadowBlur = 0;

  // в”Җв”Җ 5. Texto de datos encima в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  fxCtx.fillStyle = 'rgba(0,255,80,0.6)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`SCAN :: ${pts.length.toString().padStart(4,'0')} pts`, 10, H - 24);
  fxCtx.fillText(`0x${Date.now().toString(16).toUpperCase()}`, 10, H - 12);
}

// в”Җв”Җв”Җ MODO FUERTE: thermal / colores falsos в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Paleta thermal: negro вҶ’ azul вҶ’ cian вҶ’ verde вҶ’ amarillo вҶ’ rojo вҶ’ blanco
const THERMAL = [
  [0,0,0],[0,0,180],[0,80,255],[0,220,220],
  [0,255,100],[180,255,0],[255,200,0],[255,80,0],[255,0,0],[255,255,255]
];

function thermalColor(luma) {
  const t   = luma / 255;
  const idx = t * (THERMAL.length - 1);
  const lo  = Math.floor(idx);
  const hi  = Math.min(lo + 1, THERMAL.length - 1);
  const f   = idx - lo;
  const r   = Math.round(THERMAL[lo][0] * (1-f) + THERMAL[hi][0] * f);
  const g   = Math.round(THERMAL[lo][1] * (1-f) + THERMAL[hi][1] * f);
  const b   = Math.round(THERMAL[lo][2] * (1-f) + THERMAL[hi][2] * f);
  return [r, g, b];
}

function drawThermal(fxCtx, now) {
  if (!cameraActive || !pixelData) {
    // Sin cГЎmara: noise thermal animado
    fxCtx.clearRect(0, 0, W, H);
    const t = now * 0.001;
    for (let y = 0; y < H; y += 4) {
      for (let x = 0; x < W; x += 4) {
        const v = (Math.sin(x*0.02 + t) + Math.cos(y*0.015 - t*0.7) + 2) / 4;
        const [r,g,b] = thermalColor(v * 255);
        fxCtx.fillStyle = `rgb(${r},${g},${b})`;
        fxCtx.fillRect(x, y, 4, 4);
      }
    }
    return;
  }

  const progress = 1 - (modeUntil - now) / 4000;

  // Dibujar la cГЎmara procesada como thermal
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width  = sampleW;
  tmpCanvas.height = sampleH;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(video, 0, 0, sampleW, sampleH);
  const frame = tmpCtx.getImageData(0, 0, sampleW, sampleH);
  const data  = frame.data;

  // Aplicar paleta thermal pixel a pixel
  for (let i = 0; i < data.length; i += 4) {
    const luma = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
    // Contrastar
    const boosted = Math.min(255, luma * 1.6);
    const [r,g,b] = thermalColor(boosted);
    data[i]   = r;
    data[i+1] = g;
    data[i+2] = b;
  }
  tmpCtx.putImageData(frame, 0, 0);

  // Escalar al canvas fx con mirror
  fxCtx.clearRect(0, 0, W, H);
  fxCtx.save();
  fxCtx.scale(-1, 1);
  fxCtx.drawImage(tmpCanvas, -W, 0, W, H);
  fxCtx.restore();

  // Scanlines encima
  for (let y = 0; y < H; y += 3) {
    fxCtx.fillStyle = 'rgba(0,0,0,0.25)';
    fxCtx.fillRect(0, y, W, 1);
  }

  // Glitch horizontal ocasional
  if (Math.random() < 0.08) {
    const sy = Math.floor(Math.random() * H);
    const sh = 2 + Math.floor(Math.random() * 8);
    const dx = (Math.random()-0.5) * 40;
    fxCtx.drawImage(fxCtx.canvas, 0, sy, W, sh, dx, sy, W, sh);
  }

  // Texto de datos encima
  fxCtx.fillStyle = 'rgba(255,255,255,0.55)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`THERMAL SCAN :: 0x${Date.now().toString(16).toUpperCase()}`, 10, H - 24);
  fxCtx.fillText(`ERR 0N1+ :: SIGNAL ${(progress*100).toFixed(0)}%`, 10, H - 12);

  // Ruido RGB en bordes
  fxCtx.fillStyle = `rgba(255,0,0,${0.1 + Math.random()*0.15})`;
  fxCtx.fillRect(0, 0, W, 2);
  fxCtx.fillRect(0, H-2, W, 2);
}

// в”Җв”Җв”Җ MATRIX ENGINE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const canvas      = document.getElementById('matrix-canvas');
const ctx         = canvas.getContext('2d');
const fxCanvas    = document.getElementById('fx-canvas');
const fxCtx       = fxCanvas.getContext('2d');
const video       = document.getElementById('video');
const sampleCanvas= document.getElementById('sample-canvas');
const sampleCtx   = sampleCanvas.getContext('2d');

let W, H, cols, rows, fontSize, cw;
let cells = [], activePhrases = [];
let motionLevel = 0, prevFrame = null;
let cameraActive = false, pixelData = null;
const sampleW = 120, sampleH = 90;

const CHARS        = '01гӮўгӮӨгӮҰгӮЁгӮӘгӮ«гӮӯгӮҜгӮұгӮіABCDEFGHIJKLMNOPQRSTUVWXYZ?!@#$%&[]{}01110100';
const BRIGHT_CHARS = '@#%&WMB80';
const GLITCH_CHARS = 'в–“в–’в–‘в–Ҳв–„в–Җв– в–Ўв–Әв—Ҷ';

const ALL_PHRASES = [
  'ВҝQuГ© harГӯas tГә en una revoluciГіn?',
  'ВҝQuГ© estГЎs preparando para hacer en una dictadura?',
  'ВҝQuГ© vas a hacer cuando torturen a tu hermano?',
  'ВҝQuГ©, no harГЎs nada hasta que maten a tu madre?',
  'ВЎLevГЎntate!',
  'Que estГЎs perdiendo el tempio',
  'InfГіrmate y actГәa',
  'Nadie te salvarГЎ',
  'Te esperas hasta que llegue el dГӯa',
  'En que tu vecino te eche a los milicos',
  'Y todo tu dinero pierda su valor',
  'Y conviertan a tu casa en tu prisiГіn',
  'DespuГ©s serГЎ demasiado tarde',
  'No te olvides que la libertad no es gratis',
  'JamГЎs digas que nunca va a pasar aquГӯ',
  'No pienses que el mundo estГЎ tan lejos',
  'Siempre pueden, siempre te pueden encontrar',
];

function resize() {
  W = canvas.width  = fxCanvas.width  = window.innerWidth;
  H = canvas.height = fxCanvas.height = window.innerHeight;
  fontSize = Math.max(13, Math.min(17, W / 38));
  cw   = fontSize * 0.62;
  cols = Math.floor(W / cw);
  rows = Math.floor(H / fontSize) + 1;
  sampleCanvas.width = sampleW; sampleCanvas.height = sampleH;
  buildGrid();
}

function randChar()   { return CHARS[Math.floor(Math.random() * CHARS.length)]; }
function randBright() { return BRIGHT_CHARS[Math.floor(Math.random() * BRIGHT_CHARS.length)]; }
function randGlitch() { return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]; }

function buildGrid() {
  cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++)
      cells[r][c] = { ch: randChar(), timer: Math.random() * 20 };
  }
  activePhrases = [];
}

function sampleVideo() {
  if (!cameraActive || video.readyState < 2) return null;
  sampleCtx.drawImage(video, 0, 0, sampleW, sampleH);
  return sampleCtx.getImageData(0, 0, sampleW, sampleH).data;
}

function getPixelBrightness(r, c) {
  if (!pixelData) return 0;
  const px  = Math.floor((c / cols) * sampleW);
  const py  = Math.floor((r / rows) * sampleH);
  const mx  = sampleW - 1 - px;
  const idx = (py * sampleW + mx) * 4;
  let luma  = pixelData[idx]*0.299 + pixelData[idx+1]*0.587 + pixelData[idx+2]*0.114;
  luma = (luma - 128) * 1.8 + 128;
  return Math.max(0, Math.min(255, luma)) / 255;
}

function detectMotion(frame) {
  let diff = 0;
  if (prevFrame && frame) {
    for (let i = 0; i < frame.length; i += 4) diff += Math.abs(frame[i] - prevFrame[i]);
    diff /= (sampleW * sampleH * 255);
  }
  if (frame) prevFrame = new Uint8ClampedArray(frame);
  return Math.min(diff * 14, 1);
}

function spawnPhrase() {
  const phrase = ALL_PHRASES[Math.floor(Math.random() * ALL_PHRASES.length)];
  const chars  = phrase.split('');
  const rr     = Math.floor(Math.random() * rows);
  const rc     = Math.floor(Math.random() * Math.max(1, cols - chars.length - 1));
  activePhrases.push({
    chars, r: rr, c: rc,
    born: Date.now(),
    life: 4500 + Math.random() * 2500,
    drift: (Math.random()-0.5) * 0.06,
    fr: rr + (Math.random()-0.5) * 18,
  });
}

function updatePhrases(motion) {
  const now = Date.now();
  activePhrases = activePhrases.filter(p => now - p.born < p.life);
  if (motion > 0.002 && activePhrases.length < 14 && Math.random() < 0.42) spawnPhrase();
  activePhrases.forEach(p => {
    p.r += (p.fr - p.r) * 0.012 + p.drift * motion * 10;
    p.r  = Math.max(0, Math.min(rows-1, p.r));
  });
}

function getRedChar(r, c) {
  for (let p of activePhrases) {
    if ((Date.now() - p.born) / p.life > 0.95) continue;
    if (Math.round(p.r) !== r) continue;
    const ci = c - p.c;
    if (ci >= 0 && ci < p.chars.length) return p.chars[ci];
  }
  return null;
}

// в”Җв”Җв”Җ MODO LEVE: cГЎmara rojo/negro encima del matrix в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawCameraRedBlack(fxCtx) {
  if (!cameraActive || !pixelData) {
    fxCtx.clearRect(0, 0, W, H);
    return;
  }
  // Dibujar cГЎmara como imagen rojo/negro
  const tmp = document.createElement('canvas');
  tmp.width = sampleW; tmp.height = sampleH;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(video, 0, 0, sampleW, sampleH);
  const frame = tctx.getImageData(0, 0, sampleW, sampleH);
  const data  = frame.data;
  for (let i = 0; i < data.length; i += 4) {
    const luma = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
    const v    = Math.min(255, luma * 2.2);
    data[i]   = v;   // rojo
    data[i+1] = 0;   // verde = 0
    data[i+2] = 0;   // azul  = 0
  }
  tctx.putImageData(frame, 0, 0);

  fxCtx.clearRect(0, 0, W, H);
  fxCtx.globalAlpha = 0.65;
  fxCtx.save();
  fxCtx.scale(-1, 1);
  fxCtx.drawImage(tmp, -W, 0, W, H);
  fxCtx.restore();
  fxCtx.globalAlpha = 1;

  // Scanlines
  for (let y = 0; y < H; y += 2) {
    fxCtx.fillStyle = 'rgba(0,0,0,0.18)';
    fxCtx.fillRect(0, y, W, 1);
  }
}

// в”Җв”Җв”Җ DRAW MATRIX в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawMatrix() {
  const now      = Date.now();
  const isGlitch = now < glitchUntil;
  const level    = isGlitch ? glitchLevel : 0;

  ctx.fillStyle = level > 0 ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${fontSize}px "Courier New", monospace`;

  for (let r = 0; r < rows; r++) {
    const shift      = (level >= 2 && glitchShift[r]) ? glitchShift[r] : 0;
    const rowCorrupt = level === 3 && Math.random() < 0.07;

    for (let c = 0; c < cols; c++) {
      const cell   = cells[r][c];
      cell.timer  -= level > 0 ? (1 + level) : 1;
      const bright = getPixelBrightness(r, c);
      const isBody = bright > 0.32;

      if (cell.timer <= 0) {
        if (rowCorrupt || (level >= 2 && Math.random() < 0.12)) {
          cell.ch    = randGlitch();
          cell.timer = 2 + Math.random() * 5;
        } else {
          cell.ch    = isBody ? randBright() : randChar();
          cell.timer = isBody ? (4 + Math.random()*10) : (10 + Math.random()*34);
        }
      }

      const xPos = c * cw + shift;
      const yPos = r * fontSize;
      const red  = getRedChar(r, c);

      if (red !== null) {
        ctx.fillStyle   = '#ff2a2a';
        ctx.shadowBlur  = level > 0 ? 10 : 5;
        ctx.shadowColor = '#ff0000';
        ctx.fillText(red, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else if (rowCorrupt) {
        ctx.fillStyle = `rgba(255,${Math.floor(Math.random()*40)},0,0.8)`;
        ctx.fillText(cell.ch, xPos, yPos);
      } else if (isBody) {
        const a = 0.18 + bright * 0.35 + (level > 0 ? Math.random()*0.2 : 0);
        ctx.fillStyle   = `rgba(255,255,255,${a})`;
        ctx.shadowBlur  = level > 0 ? 4 : 2;
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.fillText(cell.ch, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*(0.07 + level*0.05)})`;
        ctx.fillText(cell.ch, xPos, yPos);
      }
    }

    if (level === 3 && Math.random() < 0.012) {
      ctx.fillStyle = `rgba(255,0,0,${0.3 + Math.random()*0.4})`;
      ctx.fillRect(0, r * fontSize, W, 1);
    }
  }
}

// в”Җв”Җв”Җ LOOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loop() {
  const now   = Date.now();
  pixelData   = sampleVideo();
  const raw   = detectMotion(pixelData);
  motionLevel += (raw - motionLevel) * 0.18;
  updateAudioMotion(motionLevel);
  updatePhrases(motionLevel);
  drawMatrix();

  if (now < modeUntil) {
    if (currentMode === 'leve')   drawCameraRedBlack(fxCtx);
    if (currentMode === 'medio')  drawLines(fxCtx, now);
    if (currentMode === 'fuerte') drawThermal(fxCtx, now);
  } else if (currentMode !== 'matrix') {
    fxCtx.clearRect(0, 0, W, H);
    currentMode = 'matrix';
    glitchLevel = 0;
  }

  requestAnimationFrame(loop);
}

// в”Җв”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function iniciar() {
  document.getElementById('start').style.display = 'none';
  try { initAudio(); } catch(_) {}
  connectWS();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
  } catch(_) {
    cameraActive = false;
    setInterval(() => { motionLevel = 0.05 + Math.random() * 0.3; }, 2500);
  }

  resize();
  loop();
}

window.addEventListener('resize', resize);
resize();
</script>
