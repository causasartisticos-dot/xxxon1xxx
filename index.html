function drawGlitchBG() {

  if (!_stars16) {

  gctx.fillStyle = '#000';
  gctx.fillRect(0, 0, gW, gH);

  // ── Starfield — scroll horizontal como pantalla de carga PS1 ─────────────

    gctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.s, s.s);

  // ── Bloques de VRAM corrompida — artefactos de memoria 16-bit ────────────
  const pal16 = [
    [220,0,0],[0,160,255],[255,200,0],[180,0,255],
    [0,255,100],[255,60,0],[255,255,255],[0,200,180]
  ];
  const numBlocks = 3 + Math.floor(Math.random() * 6);
  for (let i = 0; i < numBlocks; i++) {
    if (Math.random() > 0.55) continue;
    const [r,g,b] = pal16[Math.floor(Math.random() * pal16.length)];
    const bw = Math.floor(gW * (0.04 + Math.random() * 0.38));

  // ── Tile dithered — textura de fondo 16-bit ───────────────────────────────

    const tx = Math.floor(Math.random() * gW * 0.75);
    const ty = Math.floor(Math.random() * gH * 0.75);

  // ── Líneas horizontales de corrupción — artifact de render PS1 ────────────
  const nLines = 2 + Math.floor(Math.random() * 5);

    const y  = Math.floor(Math.random() * gH);

    const [r,g,b] = pal16[Math.floor(Math.random() * pal16.length)];
    gctx.fillStyle = `rgba(${r},${g},${b},${0.18 + Math.random() * 0.55})`;
    gctx.fillRect(lx, y, lw, 1 + Math.floor(Math.random() * 2));
  }

  // ── Caracteres glitch 16-bit — texto corrupto flotando ───────────────────
  const gc16 = '▓▒░█▄▀■□◆?!#@%01';
  if (Math.random() < 0.28) {
    const tx  = Math.floor(Math.random() * gW * 0.72);

    const len = 3 + Math.floor(Math.random() * 16);
    const [r,g,b] = pal16[Math.floor(Math.random() * pal16.length)];
    gctx.font = `${7 + Math.floor(Math.random()*7)}px Courier New`;

  masterGain.connect(audioCtx.destination);

  song.loop = true;
  const src = audioCtx.createMediaElementSource(song);
  src.connect(masterGain);
  song.play().catch(() => {});
  const bufSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
  const ns = audioCtx.createBufferSource();

function drawPointCloud(fxCtx, now) {

  // ── Eliminar ventanas viejas ───────────────────────────────────────────────
  _winsData.wins = _winsData.wins.filter(w => now - w.born < w.life);

  // ── Dibujar cada ventana ───────────────────────────────────────────────────
  const lineH  = 13;
  const padX   = 6;
  const titleH = 16;

  for (const w of _winsData.wins) {
    const age   = now - w.born;
    const alpha = age < 120 ? age/120 : (age > w.life - 200 ? (w.life-age)/200 : 1);
    if (alpha <= 0) continue;

    // Borde de ventana
    fxCtx.globalAlpha = alpha * 0.9;
    fxCtx.strokeStyle = w.color;
    fxCtx.lineWidth   = 1;
    fxCtx.strokeRect(w.x, w.y, w.w, w.h);

    // Barra de título
    fxCtx.fillStyle = w.color;
    fxCtx.globalAlpha = alpha * 0.15;
    fxCtx.fillRect(w.x, w.y, w.w, titleH);

    // Texto del título
    fxCtx.globalAlpha = alpha * 0.85;
    fxCtx.fillStyle   = w.color;
    fxCtx.font        = '9px Courier New';
    fxCtx.fillText(w.title.slice(0, Math.floor(w.w / 6)), w.x + padX, w.y + 11);

    // Fondo interior muy oscuro
    fxCtx.globalAlpha = alpha * 0.06;
    fxCtx.fillStyle   = w.color;
    fxCtx.fillRect(w.x+1, w.y+titleH, w.w-2, w.h-titleH-1);

    // ── Typewriter de código ─────────────────────────────────────────────────
    fxCtx.globalAlpha = alpha;
    fxCtx.font        = '10px Courier New';
    const maxLines = Math.floor((w.h - titleH - 4) / lineH);
    // Avanzar chars mostrados
    w.visibleChars += 3 + Math.floor(Math.random() * 5);

    let totalChars = 0;
    let linesDone  = 0;
    for (let li = 0; li < w.lines.length && linesDone < maxLines; li++) {
      const line     = w.lines[li];
      const shown    = Math.max(0, Math.min(line.length, w.visibleChars - totalChars));
      const lineText = line.slice(0, shown);
      const ly       = w.y + titleH + 4 + linesDone * lineH + lineH;

      // Color según contenido — rojo para errores, verde para éxito, blanco normal
      if (line.includes('ERROR') || line.includes('PANIC') || line.includes('fault')) {
        fxCtx.fillStyle = `rgba(255,50,50,${alpha})`;
      } else if (line.includes('SUCCESS') || line.includes('Got') || line.includes('INJECT')) {
        fxCtx.fillStyle = `rgba(50,255,80,${alpha})`;
      } else {
        fxCtx.fillStyle = `rgba(${parseInt(w.color.slice(1,3),16)||200},${parseInt(w.color.slice(3,5),16)||200},${parseInt(w.color.slice(5,7),16)||200},${alpha*0.85})`;
      }

      fxCtx.fillText(lineText, w.x + padX, ly);

      // Cursor parpadeante en la línea activa
      if (li === Math.min(w.lines.length-1, Math.floor(w.visibleChars / 12))) {
        if (Math.floor(now / 400) % 2 === 0) {
          fxCtx.fillStyle = w.color;
          fxCtx.fillRect(w.x + padX + fxCtx.measureText(lineText).width, ly - 10, 6, 11);
        }
      }

      totalChars += line.length;
      linesDone++;
    }

    // Glitch ocasional en una fila — caracteres corruptos
    if (Math.random() < 0.04) {
      w.glitchRow = Math.floor(Math.random() * Math.min(maxLines, w.lines.length));

    if (w.glitchRow >= 0 && w.glitchRow < maxLines) {

      for (let gc2=0; gc2 < 18; gc2++) gstr += glitchChars[Math.floor(Math.random()*glitchChars.length)];
      fxCtx.fillStyle = `rgba(255,0,0,${alpha * 0.7})`;

      if (Math.random() < 0.3) w.glitchRow = -1;

    fxCtx.fillStyle = `rgba(0,255,60,${0.015 + Math.random()*0.025})`;

  // ── Scanlines finas ────────────────────────────────────────────────────────

    fxCtx.fillStyle = 'rgba(0,0,0,0.12)';
    fxCtx.fillRect(0, y, W, 1);

  }
}

// ─── MODO FUERTE: DATAMOSH — súper corrupto, imagen destruida ─────────────────
let _dmPrev = null;

function drawDatamosh(fxCtx, now) {
  if (!cameraActive || video.readyState < 2) {
    fxCtx.clearRect(0, 0, W, H); return;
  }

  // Canvas de acumulación
  if (!dmAccum || dmAccum.width !== W) {
    dmAccum = document.createElement('canvas');
    dmAccum.width = W; dmAccum.height = H;
    _dmPrev = null;
  }
  const ac  = dmAccum.getContext('2d');
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc  = tmp.getContext('2d');
  tc.save(); tc.scale(-1,1); tc.drawImage(video,-W,0,W,H); tc.restore();

  const t = now * 0.001;

  // ── Capturar frame y aplicar channel shift por píxel ────────────────────
  const capW = Math.min(W, 640), capH = Math.min(H, 480);
  const src  = document.createElement('canvas');
  src.width  = capW; src.height = capH;
  const sctx = src.getContext('2d');
  sctx.save(); sctx.scale(-1,1); sctx.drawImage(video,-capW,0,capW,capH); sctx.restore();

  const frame  = sctx.getImageData(0, 0, capW, capH);
  const data   = frame.data;
  const shiftR = Math.floor(Math.sin(t * 1.8) * 70 + Math.random() * 45);
  const shiftB = Math.floor(Math.cos(t * 1.1) * 85 + Math.random() * 35);
  const shifted = new Uint8ClampedArray(data.length);

  for (let y = 0; y < capH; y++) {
    for (let x = 0; x < capW; x++) {
      const i  = (y * capW + x) * 4;
      const xR = Math.min(capW-1, x + shiftR);
      const iR = (y * capW + xR) * 4;
      const xB = Math.max(0, x - shiftB);
      const iB = (y * capW + xB) * 4;
      shifted[i]   = data[iR];
      shifted[i+1] = data[i+1];
      shifted[i+2] = data[iB+2];
      shifted[i+3] = 255;
    }
  }

  // ── Pixel sorting en 80% de filas ────────────────────────────────────────
  const sorted = new Uint8ClampedArray(shifted);
  const nSort  = Math.floor(capH * 0.80);
  for (let si = 0; si < nSort; si++) {
    const y   = Math.floor(Math.random() * capH);
    const row = [];
    for (let x = 0; x < capW; x++) {
      const i    = (y * capW + x) * 4;
      const luma = shifted[i]*0.299 + shifted[i+1]*0.587 + shifted[i+2]*0.114;
      row.push({ luma, r: shifted[i], g: shifted[i+1], b: shifted[i+2] });
    }
    const start = Math.floor(Math.random() * capW * 0.4);
    const len   = Math.floor(capW * (0.4 + Math.random() * 0.6));
    const seg   = row.slice(start, start+len).sort((a,b) => a.luma - b.luma);
    for (let x = 0; x < seg.length; x++) {
      const i = (y * capW + start + x) * 4;
      sorted[i] = seg[x].r; sorted[i+1] = seg[x].g;
      sorted[i+2] = seg[x].b; sorted[i+3] = 255;
    }
  }

  // ── Block displacement agresivo ───────────────────────────────────────────
  const blocks  = new Uint8ClampedArray(sorted);
  const nBlocks = 25 + Math.floor(Math.random() * 30);
  for (let b = 0; b < nBlocks; b++) {
    const bx  = Math.floor(Math.random() * (capW - 50));
    const by  = Math.floor(Math.random() * (capH - 15));
    const bw  = 50 + Math.floor(Math.random() * 200);
    const bh  = 3  + Math.floor(Math.random() * 50);
    const dx  = Math.floor((Math.random()-0.5) * capW * 0.8);
    const dy  = Math.floor((Math.random()-0.5) * capH * 0.3);
    for (let ry = 0; ry < bh; ry++) {
      const sy = Math.min(capH-1, by+ry);
      const ty2 = Math.min(capH-1, Math.max(0, by+ry+dy));
      for (let rx = 0; rx < bw; rx++) {
        const sx  = Math.min(capW-1, bx+rx);
        const tx2 = Math.min(capW-1, Math.max(0, bx+rx+dx));
        const si2 = (sy*capW+sx)*4;
        const ti  = (ty2*capW+tx2)*4;
        blocks[ti]   = Math.min(255, sorted[si2]   * 3.5);
        blocks[ti+1] = Math.min(255, sorted[si2+1] * 0.2);
        blocks[ti+2] = Math.min(255, sorted[si2+2] * 4.0);
        blocks[ti+3] = 255;
      }
    }
  }

  // Boost de saturación global
  for (let i = 0; i < blocks.length; i+=4) {
    blocks[i]   = Math.min(255, blocks[i]   * 2.5);
    blocks[i+1] = Math.min(255, blocks[i+1] * 2.5);
    blocks[i+2] = Math.min(255, blocks[i+2] * 2.5);
  }

  sctx.putImageData(new ImageData(blocks, capW, capH), 0, 0);

  // ── Render + ghost frame ──────────────────────────────────────────────────
  fxCtx.clearRect(0, 0, W, H);
  fxCtx.globalAlpha = 0.78;
  fxCtx.drawImage(src, 0, 0, W, H);
  fxCtx.globalAlpha = 1;

  if (_dmPrev) {
    fxCtx.globalAlpha = 0.52;
    fxCtx.globalCompositeOperation = 'screen';
    fxCtx.drawImage(_dmPrev, 0, 0, W, H);
    fxCtx.globalAlpha = 1;
    fxCtx.globalCompositeOperation = 'source-over';
  }

  // ── Glitch strips agresivos ────────────────────────────────────────────────
  const nStrips = 12 + Math.floor(Math.random() * 18);
  for (let s = 0; s < nStrips; s++) {
    if (Math.random() > 0.72) continue;
    const sy  = Math.floor(Math.random() * H);
    const sh  = 1 + Math.floor(Math.random() * 30);
    const sdx = (Math.random()-0.5) * W * 0.5;
    fxCtx.drawImage(fxCtx.canvas, 0, sy, W, sh, sdx, sy, W, sh);
  }

  // ── Color flash ───────────────────────────────────────────────────────────
  if (Math.random() < 0.2) {
    const fc = [
      'rgba(255,0,200,0.28)','rgba(0,255,80,0.22)',
      'rgba(255,220,0,0.25)','rgba(0,200,255,0.22)'
    ];
    fxCtx.fillStyle = fc[Math.floor(Math.random()*fc.length)];
    fxCtx.fillRect(0, 0, W, H);
  }

  // ── Color overlay rotativo ─────────────────────────────────────────────────
  fxCtx.globalCompositeOperation = 'overlay';
  fxCtx.globalAlpha = 0.28;
  fxCtx.fillStyle = `hsl(${(now*0.09)%360},100%,50%)`;
  fxCtx.fillRect(0,0,W,H);
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';

  // Guardar frame para ghost
  _dmPrev = document.createElement('canvas');
  _dmPrev.width = W; _dmPrev.height = H;
  _dmPrev.getContext('2d').drawImage(fxCtx.canvas, 0, 0);

  fxCtx.fillStyle = 'rgba(255,220,0,0.35)';
  fxCtx.font = '9px Courier New';
  fxCtx.fillText(`DATAMOSH :: ERR 0x${now.toString(16).slice(-6).toUpperCase()}`, 10, H-12);
}

// ─── MATRIX ENGINE ────────────────────────────────────────────────────────────
const canvas      = document.getElementById('matrix-canvas');
const ctx         = canvas.getContext('2d');
const fxCanvas    = document.getElementById('fx-canvas');
const fxCtx       = fxCanvas.getContext('2d');
const video       = document.getElementById('video');
const sampleCanvas= document.getElementById('sample-canvas');
const sampleCtx   = sampleCanvas.getContext('2d');

let W, H, cols, rows, fontSize, cw;
let cells = [], activePhrases = [];
let motionLevel = 0, prevFrame = null;
let cameraActive = false, pixelData = null;
const sampleW = 120, sampleH = 90;

const CHARS        = '01アイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ?!@#$%&[]{}01110100';
const BRIGHT_CHARS = '@#%&WMB80';
const GLITCH_CHARS = '▓▒░█▄▀■□▪◆';

const ALL_PHRASES = [
  '¿Qué harías tú en una revolución?',
  '¿Qué estás preparando para hacer en una dictadura?',
  '¿Qué vas a hacer cuando torturen a tu hermano?',
  '¿Qué, no harás nada hasta que maten a tu madre?',
  '¡Levántate!',
  'Que estás perdiendo el tempio',
  'Infórmate y actúa',
  'Nadie te salvará',
  'Te esperas hasta que llegue el día',
  'En que tu vecino te eche a los milicos',
  'Y todo tu dinero pierda su valor',
  'Y conviertan a tu casa en tu prisión',
  'Después será demasiado tarde',
  'No te olvides que la libertad no es gratis',
  'Jamás digas que nunca va a pasar aquí',
  'No pienses que el mundo está tan lejos',
  'Siempre pueden, siempre te pueden encontrar',
];

function resize() {
  W = canvas.width  = fxCanvas.width  = window.innerWidth;
  H = canvas.height = fxCanvas.height = window.innerHeight;
  fontSize = Math.max(13, Math.min(17, W / 38));
  cw   = fontSize * 0.62;
  cols = Math.floor(W / cw);
  rows = Math.floor(H / fontSize) + 1;
  sampleCanvas.width = sampleW; sampleCanvas.height = sampleH;
  buildGrid();
}

function randChar()   { return CHARS[Math.floor(Math.random() * CHARS.length)]; }
function randBright() { return BRIGHT_CHARS[Math.floor(Math.random() * BRIGHT_CHARS.length)]; }
function randGlitch() { return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]; }

function buildGrid() {
  cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++)
      cells[r][c] = { ch: randChar(), timer: Math.random() * 20 };
  }
  activePhrases = [];
}

function sampleVideo() {
  if (!cameraActive || video.readyState < 2) return null;
  sampleCtx.drawImage(video, 0, 0, sampleW, sampleH);
  return sampleCtx.getImageData(0, 0, sampleW, sampleH).data;
}

function getPixelBrightness(r, c) {
  if (!pixelData) return 0;
  const px  = Math.floor((c / cols) * sampleW);
  const py  = Math.floor((r / rows) * sampleH);
  const mx  = sampleW - 1 - px;
  const idx = (py * sampleW + mx) * 4;
  let luma  = pixelData[idx]*0.299 + pixelData[idx+1]*0.587 + pixelData[idx+2]*0.114;
  luma = (luma - 128) * 1.8 + 128;
  return Math.max(0, Math.min(255, luma)) / 255;
}

function detectMotion(frame) {
  let diff = 0;
  if (prevFrame && frame) {
    for (let i = 0; i < frame.length; i += 4) diff += Math.abs(frame[i] - prevFrame[i]);
    diff /= (sampleW * sampleH * 255);
  }
  if (frame) prevFrame = new Uint8ClampedArray(frame);
  return Math.min(diff * 14, 1);
}

function spawnPhrase() {
  const phrase = ALL_PHRASES[Math.floor(Math.random() * ALL_PHRASES.length)];
  const chars  = phrase.split('');
  const rr     = Math.floor(Math.random() * rows);
  const rc     = Math.floor(Math.random() * Math.max(1, cols - chars.length - 1));
  activePhrases.push({
    chars, r: rr, c: rc,
    born: Date.now(),
    life: 4500 + Math.random() * 2500,
    drift: (Math.random()-0.5) * 0.06,
    fr: rr + (Math.random()-0.5) * 18,
  });
}

function updatePhrases(motion) {
  const now = Date.now();
  activePhrases = activePhrases.filter(p => now - p.born < p.life);
  if (motion > 0.002 && activePhrases.length < 14 && Math.random() < 0.42) spawnPhrase();
  activePhrases.forEach(p => {
    p.r += (p.fr - p.r) * 0.012 + p.drift * motion * 10;
    p.r  = Math.max(0, Math.min(rows-1, p.r));
  });
}

function getRedChar(r, c) {
  for (let p of activePhrases) {
    if ((Date.now() - p.born) / p.life > 0.95) continue;
    if (Math.round(p.r) !== r) continue;
    const ci = c - p.c;
    if (ci >= 0 && ci < p.chars.length) return p.chars[ci];
  }
  return null;
}

function drawMatrix() {
  const now      = Date.now();
  const isGlitch = now < glitchUntil;
  const level    = isGlitch ? glitchLevel : 0;

  ctx.fillStyle = level > 0 ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${fontSize}px "Courier New", monospace`;

  for (let r = 0; r < rows; r++) {
    const shift      = (level >= 2 && glitchShift[r]) ? glitchShift[r] : 0;
    const rowCorrupt = level === 3 && Math.random() < 0.07;

    for (let c = 0; c < cols; c++) {
      const cell   = cells[r][c];
      cell.timer  -= level > 0 ? (1 + level) : 1;
      const bright = getPixelBrightness(r, c);
      const isBody = bright > 0.32;

      if (cell.timer <= 0) {
        if (rowCorrupt || (level >= 2 && Math.random() < 0.12)) {
          cell.ch    = randGlitch();
          cell.timer = 2 + Math.random() * 5;
        } else {
          cell.ch    = isBody ? randBright() : randChar();
          cell.timer = isBody ? (4 + Math.random()*10) : (10 + Math.random()*34);
        }
      }

      const xPos = c * cw + shift;
      const yPos = r * fontSize;
      const red  = getRedChar(r, c);

      if (red !== null) {
        ctx.fillStyle   = '#ff2a2a';
        ctx.shadowBlur  = level > 0 ? 10 : 5;
        ctx.shadowColor = '#ff0000';
        ctx.fillText(red, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else if (rowCorrupt) {
        ctx.fillStyle = `rgba(255,${Math.floor(Math.random()*40)},0,0.8)`;
        ctx.fillText(cell.ch, xPos, yPos);
      } else if (isBody) {
        const a = 0.18 + bright * 0.35 + (level > 0 ? Math.random()*0.2 : 0);
        ctx.fillStyle   = `rgba(255,255,255,${a})`;
        ctx.shadowBlur  = level > 0 ? 4 : 2;
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.fillText(cell.ch, xPos, yPos);
        ctx.shadowBlur  = 0;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*(0.07 + level*0.05)})`;
        ctx.fillText(cell.ch, xPos, yPos);
      }
    }

    if (level === 3 && Math.random() < 0.012) {
      ctx.fillStyle = `rgba(255,0,0,${0.3 + Math.random()*0.4})`;
      ctx.fillRect(0, r * fontSize, W, 1);
    }
  }
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() {
  const now   = Date.now();
  pixelData   = sampleVideo();
  const raw   = detectMotion(pixelData);
  motionLevel += (raw - motionLevel) * 0.18;
  updateAudioMotion(motionLevel);
  updatePhrases(motionLevel);
  drawMatrix();

  if (now < modeUntil) {
    if (currentMode === 'leve')   drawPointCloud(fxCtx, now);
    if (currentMode === 'medio')  drawThermal(fxCtx, now);
    if (currentMode === 'fuerte') drawDatamosh(fxCtx, now);
  } else if (currentMode !== 'matrix') {
    fxCtx.clearRect(0, 0, W, H);
    currentMode = 'matrix';
    glitchLevel = 0;
    _winsData   = null;
    dmAccum     = null;
    _dmPrev     = null;
  }

  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function iniciar() {
  document.getElementById('start').style.display = 'none';
  try { initAudio(); } catch(_) {}
  connectWS();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
  } catch(_) {
    cameraActive = false;
    setInterval(() => { motionLevel = 0.05 + Math.random() * 0.3; }, 2500);
  }

  resize();
  loop();
}

window.addEventListener('resize', resize);
resize();
</script>
